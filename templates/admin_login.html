<!DOCTYPE html>
<html>

<head>
    <title>Grand African Plate Hotel - Login</title>

    <style>

        body{
            background:#f5f5f5;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-box{

            width:380px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);

        }

        h2{

            text-align:center;
            color:#1b4332;

        }

        input{

            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;

        }

        button{

            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#1b4332;
            color:white;
            font-size:16px;
            cursor:pointer;

        }

        button:hover{

            background:#2d6a4f;

        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Grand African Plate Hotel</h2>

    <h3 style="text-align:center;">System Login</h3>

    <form method="POST">

        <label>Username</label>

        <input
            type="text"
            name="username"
            required
        >

        <label>Password</label>

        <input
            type="password"
            name="password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>

</html>
