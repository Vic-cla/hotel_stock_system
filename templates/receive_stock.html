{% extends "layouts/base.html" %}

{% block title %}
    Receive Stock
{% endblock %}

{% block page_title %}
    Receive Stock
{% endblock %}

{% block content %}

    <h2>Receive New Stock</h2>

    <form method="POST">

        <label>Product</label><br>
        <select name="product_id" required>
            {% for product in products %}
                <option value="{{ product.id }}">{{ product.product_name }}</option>
            {% endfor %}
        </select><br><br>

        <label>Quantity Received</label><br>
        <input type="number" name="quantity_received" required><br><br>
    <label>Buying Price</label><br>
        <input type="number" step="0.01" name="buying_price" required><br><br>
        <button type="submit">Receive Stock</button>

    </form>

{% endblock %}
